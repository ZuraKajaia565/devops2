groups:
  - name: app_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(app_errors_total[1m]) > 0.0833
        for: 1m
        labels:
          severity: CRITICAL
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} per second (> 0.0833/s ≈ 5/min) for the last 1 minute."
