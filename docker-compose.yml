services:
  app:
    build: ./app
    image: devops2-app:latest
    container_name: app
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - ./logs/app:/var/log/app
    networks:
      - observability
    restart: unless-stopped
    environment:
      - PORT=${APP_PORT:-5000}
      - TZ=${TZ:-Asia/Tbilisi}
      - LOG_DIR=/var/log/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
    networks:
      - observability
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    depends_on:
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - observability
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    security_opt:
      - no-new-privileges:true

  loki:
    image: grafana/loki:3.1.0
    container_name: loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    networks:
      - observability
    restart: unless-stopped
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    security_opt:
      - no-new-privileges:true

  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - ./logs/app:/var/log/app
    networks:
      - observability
    restart: unless-stopped
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    depends_on:
      loki:
        condition: service_started
      app:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

networks:
  observability:
    driver: bridge

volumes:
  loki-data:
